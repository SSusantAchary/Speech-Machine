services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
      POSTGRES_DB: video
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg2://video:video@db:5432/video
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      LOCAL_ONLY_MODE: ${LOCAL_ONLY_MODE:-true}
      STORAGE_DIR: /data/storage
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
    volumes:
      - api_storage:/data/storage
      - api_models:/data/models
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_LOCAL_ONLY_MODE: ${NEXT_PUBLIC_LOCAL_ONLY_MODE:-true}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
  api_storage:
  api_models:
